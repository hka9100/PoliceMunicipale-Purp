<!-- Firebase avec Realtime Database -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, push, onValue, remove, update, get, child } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
  import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCGYQ7h7nkwegjLyLifsv29eiupnXRiC4w",
    authDomain: "site-pmpurp.firebaseapp.com",
    projectId: "site-pmpurp",
    storageBucket: "site-pmpurp.firebasestorage.app",
    messagingSenderId: "645801350661",
    appId: "1:645801350661:web:e49fb3ec167dbc1b526e6c",
    measurementId: "G-NMC3HGDH6R",
    databaseURL: "https://site-pmpurp-default-rtdb.firebaseio.com/"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const storage = getStorage(app);

  window.db = db;
  window.storage = storage;
  window.firebaseAPI = { ref, set, push, onValue, remove, update, get, child, storageRef, uploadBytes, getDownloadURL };

  window.dispatchEvent(new CustomEvent('firebase-ready', { detail: { db, storage } }));
</script>

<style>

    align-items: center;
