<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Police Municipale - Panneau de Commandement</title>
    <!-- Firebase SDK compat (plus fiable) -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0f1a;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
        }
        /* Écran de connexion */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0f1a 0%, #0c1320 100%);
        }
        .login-card {
            background: #111a28;
            padding: 2rem;
            border-radius: 16px;
            border: 1px solid #2a3a55;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .login-card h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: #4a9eff;
        }
        .input-group {
            margin-bottom: 1rem;
        }
        .input-group label {
            display: block;
            font-size: 0.8rem;
            margin-bottom: 0.3rem;
            color: #8aa0c0;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 0.6rem;
            background: #1e2a3a;
            border: 1px solid #2a3a55;
            border-radius: 8px;
            color: #fff;
        }
        button {
            background: #2a6df0;
            color: white;
            border: none;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: 0.2s;
        }
        button:hover {
            background: #1a5ad0;
        }
        .switch-btn {
            background: transparent;
            border: 1px solid #4a9eff;
            color: #4a9eff;
            margin-top: 0.5rem;
        }
        .message {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: #ffaa66;
        }
        /* Application principale */
        .app {
            display: none;
        }
        .header {
            background: #111a28;
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #2a3a55;
        }
        .sidebar {
            width: 240px;
            background: #0e1622;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            padding-top: 60px;
            border-right: 1px solid #2a3a55;
        }
        .sidebar-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: 0.2s;
        }
        .sidebar-item:hover, .sidebar-item.active {
            background: #1e2a3a;
            color: #4a9eff;
        }
        .main-content {
            margin-left: 240px;
            padding: 20px;
        }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .stat-card {
            background: #111a28;
            border: 1px solid #2a3a55;
            border-radius: 12px;
            padding: 15px 25px;
            flex: 1;
            min-width: 150px;
        }
        .stat-number {
            font-size: 2rem;
            font-weight: bold;
            color: #4a9eff;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #111a28;
            border-radius: 12px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #2a3a55;
        }
        th {
            background: #0e1622;
            color: #8aa0c0;
        }
        .badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
        }
        .badge-open { background: #aa2e4e; }
        .badge-closed { background: #2e7d64; }
        .badge-progress { background: #c97e2a; }
        .btn-sm {
            padding: 4px 8px;
            font-size: 0.7rem;
            width: auto;
            margin: 0 2px;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: #111a28;
            border: 1px solid #2a3a55;
            border-radius: 16px;
            padding: 20px;
            width: 500px;
            max-width: 90%;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #2a6df0;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 2000;
            animation: fadeOut 3s forwards;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<!-- Écran de connexion / inscription -->
<div id="loginScreen" class="login-container">
    <div class="login-card">
        <h2>🛡️ POLICE MUNICIPALE</h2>
        <div style="display: flex; gap: 10px; margin-bottom: 20px;">
            <button id="btnLoginTab" style="background: #2a6df0;">Connexion</button>
            <button id="btnRegisterTab" class="switch-btn">Demander l'accès</button>
        </div>
        <!-- Formulaire connexion -->
        <div id="loginForm">
            <div class="input-group">
                <label>Prénom (IC)</label>
                <input type="text" id="loginPrenom" placeholder="Jean">
            </div>
            <div class="input-group">
                <label>Nom (IC)</label>
                <input type="text" id="loginNom" placeholder="Dupont">
            </div>
            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="loginPassword" placeholder="••••••">
            </div>
            <button id="doLoginBtn">Se connecter</button>
            <div id="loginMessage" class="message"></div>
        </div>
        <!-- Formulaire d'inscription -->
        <div id="registerForm" style="display: none;">
            <div class="input-group">
                <label>Prénom IC</label>
                <input type="text" id="regPrenom">
            </div>
            <div class="input-group">
                <label>Nom IC</label>
                <input type="text" id="regNom">
            </div>
            <div class="input-group">
                <label>Pseudo Discord</label>
                <input type="text" id="regPseudo">
            </div>
            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="regPassword">
            </div>
            <div class="input-group">
                <label>Confirmer mot de passe</label>
                <input type="password" id="regPassword2">
            </div>
            <div class="input-group">
                <label>Grade souhaité</label>
                <select id="regGrade">
                    <option>Gardien Stagiaire</option>
                    <option>Gardien Titulaire</option>
                    <option>Brigadier</option>
                    <option>Chef de Police</option>
                    <option>Directeur</option>
                </select>
            </div>
            <button id="doRegisterBtn">Envoyer la demande</button>
            <div id="registerMessage" class="message"></div>
        </div>
    </div>
</div>

<!-- Application principale -->
<div id="mainApp" class="app">
    <div class="sidebar">
        <div style="padding: 20px; font-weight: bold; border-bottom: 1px solid #2a3a55;">📋 PM Panel</div>
        <div class="sidebar-item active" data-page="dashboard">📊 Tableau de bord</div>
        <div class="sidebar-item" data-page="rapports">📄 Rapports</div>
        <div class="sidebar-item" data-page="signalements">🚨 Signalements</div>
        <div class="sidebar-item" data-page="plaintes">⚖️ Plaintes</div>
        <div class="sidebar-item" data-page="saisies">🔫 Saisies</div>
        <div class="sidebar-item" data-page="fiches">👤 Fiches</div>
        <div class="sidebar-item" data-page="vehicules">🚗 Véhicules</div>
        <div class="sidebar-item" data-page="agents">👮 Agents</div>
        <div class="sidebar-item admin-only" id="adminItem" style="display: none;" data-page="gestion">⚙️ Gestion</div>
        <div style="position: absolute; bottom: 20px; left: 0; right: 0; padding: 20px;">
            <div id="userInfo" style="margin-bottom: 10px;"></div>
            <button id="logoutBtn" class="btn-sm">Déconnexion</button>
        </div>
    </div>
    <div class="main-content">
        <div class="header">
            <h2 id="pageTitle">Tableau de bord</h2>
            <button id="newItemBtn" class="btn-sm">➕ Nouveau</button>
        </div>
        <div id="pageContent">
            <!-- Le contenu dynamique -->
        </div>
    </div>
</div>

<!-- Modale générique -->
<div id="genericModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Titre</h3>
            <button id="closeModalBtn" style="width: auto; background: none; font-size: 20px;">&times;</button>
        </div>
        <div id="modalBody"></div>
        <div style="display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px;">
            <button id="modalCancelBtn" class="btn-sm" style="background: #555;">Annuler</button>
            <button id="modalSaveBtn" class="btn-sm">Enregistrer</button>
        </div>
    </div>
</div>

<script>
    // Configuration Firebase d'après votre capture
    const firebaseConfig = {
        apiKey: "AIzaSyC6YQ7h7nkwegjLyLifsv29eiunxRlC4w",
        authDomain: "site-pmpurp.firebaseapp.com",
        databaseURL: "https://site-pmpurp-default-rtdb.firebaseio.com/",
        projectId: "site-pmpurp",
        storageBucket: "site-pmpurp.firebasestorage.app",
        messagingSenderId: "645801350661",
        appId: "1:645801350661:web:e49fb3ec167dbc1b526e6c",
        measurementId: "G-NMC3HGDNH6R"
    };

    // Initialisation
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Variables globales
    let currentUser = null;
    let currentEditId = null;
    let currentType = null;
    let usersCache = {}; // pour les droits

    // Fonctions utilitaires
    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    async function hashPassword(pwd) {
        const encoder = new TextEncoder();
        const data = encoder.encode(pwd);
        const hash = await crypto.subtle.digest('SHA-256', data);
        return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
    }

    function canDelete() {
        return currentUser && (currentUser.grade === 'Directeur' || currentUser.grade === 'Directeur Adjoint');
    }

    function canEdit(item) {
        if (!currentUser) return false;
        if (canDelete()) return true;
        return item.createdById === currentUser.id;
    }

    // Afficher une page
    function showPage(page) {
        document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
        document.querySelector(`.sidebar-item[data-page="${page}"]`).classList.add('active');
        document.getElementById('pageTitle').innerText = page.charAt(0).toUpperCase() + page.slice(1);
        if (page === 'rapports') loadRapports();
        else if (page === 'signalements') loadSignalements();
        else if (page === 'plaintes') loadPlaintes();
        else if (page === 'saisies') loadSaisies();
        else if (page === 'fiches') loadFiches();
        else if (page === 'vehicules') loadVehicules();
        else if (page === 'agents') loadAgents();
        else if (page === 'gestion') loadGestion();
        else if (page === 'dashboard') loadDashboard();
    }

    // --- CHARGEMENT DES DONNÉES ---
    async function loadDashboard() {
        const stats = {
            rapports: 0, signalements: 0, plaintes: 0, saisies: 0
        };
        const snapR = await db.ref('rapports').once('value');
        stats.rapports = snapR.numChildren();
        const snapSg = await db.ref('signalements').once('value');
        stats.signalements = snapSg.numChildren();
        const snapP = await db.ref('plaintes').once('value');
        stats.plaintes = snapP.numChildren();
        const snapSa = await db.ref('saisies').once('value');
        stats.saisies = snapSa.numChildren();

        let html = `<div class="stats">
            <div class="stat-card"><div class="stat-number">${stats.rapports}</div><div>Rapports</div></div>
            <div class="stat-card"><div class="stat-number">${stats.signalements}</div><div>Signalements</div></div>
            <div class="stat-card"><div class="stat-number">${stats.plaintes}</div><div>Plaintes</div></div>
            <div class="stat-card"><div class="stat-number">${stats.saisies}</div><div>Saisies</div></div>
        </div><h3>Derniers rapports</h3><div id="lastRapports"></div>`;
        document.getElementById('pageContent').innerHTML = html;
        // Afficher 5 derniers rapports
        const rapports = [];
        snapR.forEach(child => rapports.push({id: child.key, ...child.val()}));
        rapports.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
        let listHtml = '<table><tr><th>Numéro</th><th>Type</th><th>Date</th><th>Agent</th></tr>';
        rapports.slice(0,5).forEach(r => {
            listHtml += `<tr><td>${r.num || r.id.slice(0,6)}</td><td>${r.type || '-'}</td><td>${r.date ? new Date(r.date).toLocaleString() : '-'}</td><td>${r.agent || '-'}</td></tr>`;
        });
        listHtml += '</table>';
        document.getElementById('lastRapports').innerHTML = listHtml;
    }

    async function loadRapports() {
        const snap = await db.ref('rapports').once('value');
        let items = [];
        snap.forEach(child => items.push({id: child.key, ...child.val()}));
        items.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
        let html = `<table><tr><th>N°</th><th>Date</th><th>Type</th><th>Lieu</th><th>Agent</th><th>Statut</th><th>Créé par</th><th>Actions</th></tr>`;
        for (let r of items) {
            html += `<tr>
                <td>${r.num || r.id.slice(0,6)}</td>
                <td>${r.date ? new Date(r.date).toLocaleString() : '-'}</td>
                <td>${r.type || '-'}</td>
                <td>${r.lieu || '-'}</td>
                <td>${r.agent || '-'}</td>
                <td><span class="badge ${r.statut === 'Ouvert' ? 'badge-open' : r.statut === 'Clôturé' ? 'badge-closed' : 'badge-progress'}">${r.statut || 'Ouvert'}</span></td>
                <td>${r.createdBy || '-'}</td>
                <td>
                    ${canEdit(r) ? `<button class="btn-sm" onclick="editItem('rapports','${r.id}')">✏️</button>` : ''}
                    ${canDelete() ? `<button class="btn-sm" style="background:#aa2e4e;" onclick="deleteItem('rapports','${r.id}')">🗑️</button>` : ''}
                </td>
            </tr>`;
        }
        html += '</table>';
        document.getElementById('pageContent').innerHTML = html;
        document.getElementById('newItemBtn').onclick = () => openNewRapportModal();
    }

    async function openNewRapportModal() {
        currentEditId = null;
        currentType = 'rapports';
        document.getElementById('modalTitle').innerText = 'Nouveau rapport';
        document.getElementById('modalBody').innerHTML = `
            <div class="input-group"><label>Type</label><input id="r_type" placeholder="Ex: Intervention, Patrouille"></div>
            <div class="input-group"><label>Statut</label><select id="r_statut"><option>Ouvert</option><option>En cours</option><option>Clôturé</option></select></div>
            <div class="input-group"><label>Date/Heure</label><input type="datetime-local" id="r_date"></div>
            <div class="input-group"><label>Lieu</label><input id="r_lieu"></div>
            <div class="input-group"><label>Agent responsable</label><input id="r_agent" value="${currentUser.prenom} ${currentUser.nom}"></div>
            <div class="input-group"><label>Description</label><textarea id="r_description" rows="3"></textarea></div>
        `;
        document.getElementById('modalSaveBtn').onclick = () => saveRapport();
        document.getElementById('genericModal').style.display = 'flex';
    }

    async function saveRapport() {
        const data = {
            num: `R-${Date.now().slice(-6)}`,
            type: document.getElementById('r_type').value,
            statut: document.getElementById('r_statut').value,
            date: document.getElementById('r_date').value,
            lieu: document.getElementById('r_lieu').value,
            agent: document.getElementById('r_agent').value,
            description: document.getElementById('r_description').value,
            createdAt: new Date().toISOString(),
            createdBy: `${currentUser.prenom} ${currentUser.nom}`,
            createdById: currentUser.id
        };
        if (currentEditId) {
            await db.ref(`rapports/${currentEditId}`).update(data);
            showToast('Rapport modifié');
        } else {
            await db.ref('rapports').push(data);
            showToast('Rapport créé');
        }
        document.getElementById('genericModal').style.display = 'none';
        loadRapports();
    }

    window.editItem = async (type, id) => {
        const snap = await db.ref(`${type}/${id}`).once('value');
        const data = snap.val();
        if (!canEdit(data)) { showToast("Vous ne pouvez pas modifier ce dossier"); return; }
        currentEditId = id;
        currentType = type;
        if (type === 'rapports') {
            document.getElementById('modalTitle').innerText = 'Modifier rapport';
            document.getElementById('modalBody').innerHTML = `
                <div class="input-group"><label>Type</label><input id="r_type" value="${data.type || ''}"></div>
                <div class="input-group"><label>Statut</label><select id="r_statut"><option ${data.statut==='Ouvert'?'selected':''}>Ouvert</option><option ${data.statut==='En cours'?'selected':''}>En cours</option><option ${data.statut==='Clôturé'?'selected':''}>Clôturé</option></select></div>
                <div class="input-group"><label>Date/Heure</label><input type="datetime-local" id="r_date" value="${data.date || ''}"></div>
                <div class="input-group"><label>Lieu</label><input id="r_lieu" value="${data.lieu || ''}"></div>
                <div class="input-group"><label>Agent</label><input id="r_agent" value="${data.agent || ''}"></div>
                <div class="input-group"><label>Description</label><textarea id="r_description" rows="3">${data.description || ''}</textarea></div>
            `;
            document.getElementById('modalSaveBtn').onclick = () => saveRapport();
            document.getElementById('genericModal').style.display = 'flex';
        }
        // On simplifie, on ne gère que les rapports pour l'exemple, mais vous pouvez étendre
        else {
            showToast("Modification non implémentée pour ce type");
        }
    };

    window.deleteItem = async (type, id) => {
        if (!canDelete()) { showToast("Permission refusée"); return; }
        if (confirm("Supprimer définitivement ?")) {
            await db.ref(`${type}/${id}`).remove();
            showToast("Supprimé");
            if (type === 'rapports') loadRapports();
            else if (type === 'signalements') loadSignalements();
            // etc.
        }
    };

    // Simplification pour les autres onglets (charge juste une liste)
    async function loadSignalements() {
        const snap = await db.ref('signalements').once('value');
        let html = '<table><tr><th>Type</th><th>Priorité</th><th>Zone</th><th>Date</th><th>Créé par</th><th>Actions</th></tr>';
        snap.forEach(child => {
            const s = child.val();
            html += `<tr>
                <td>${s.type || '-'}</td>
                <td>${s.priorite || 'Normal'}</td>
                <td>${s.zone || '-'}</td>
                <td>${s.date ? new Date(s.date).toLocaleString() : '-'}</td>
                <td>${s.createdBy || '-'}</td>
                <td>${canDelete() ? `<button class="btn-sm" style="background:#aa2e4e;" onclick="deleteItem('signalements','${child.key}')">🗑️</button>` : ''}</td>
            </tr>`;
        });
        html += '</table><button class="btn-sm" onclick="openSignalementModal()" style="margin-top:10px;">➕ Nouveau signalement</button>';
        document.getElementById('pageContent').innerHTML = html;
        document.getElementById('newItemBtn').style.display = 'none';
    }

    window.openSignalementModal = function() {
        document.getElementById('modalTitle').innerText = 'Nouveau signalement';
        document.getElementById('modalBody').innerHTML = `
            <div class="input-group"><label>Type</label><input id="s_type"></div>
            <div class="input-group"><label>Priorité</label><select id="s_priorite"><option>Normal</option><option>Urgent</option></select></div>
            <div class="input-group"><label>Zone</label><input id="s_zone"></div>
            <div class="input-group"><label>Date/Heure</label><input type="datetime-local" id="s_date"></div>
            <div class="input-group"><label>Description</label><textarea id="s_desc"></textarea></div>
        `;
        document.getElementById('modalSaveBtn').onclick = async () => {
            const data = {
                type: document.getElementById('s_type').value,
                priorite: document.getElementById('s_priorite').value,
                zone: document.getElementById('s_zone').value,
                date: document.getElementById('s_date').value,
                description: document.getElementById('s_desc').value,
                createdAt: new Date().toISOString(),
                createdBy: `${currentUser.prenom} ${currentUser.nom}`,
                createdById: currentUser.id
            };
            await db.ref('signalements').push(data);
            showToast("Signalement ajouté");
            document.getElementById('genericModal').style.display = 'none';
            loadSignalements();
        };
        document.getElementById('genericModal').style.display = 'flex';
    };

    // Idem pour plaintes, saisies, etc. (par souci de concision, on ne les implémente pas toutes, mais le principe est le même)
    async function loadPlaintes() { document.getElementById('pageContent').innerHTML = '<p>Fonctionnalité à développer (même structure que rapports)</p>'; }
    async function loadSaisies() { document.getElementById('pageContent').innerHTML = '<p>Fonctionnalité à développer</p>'; }
    async function loadFiches() { document.getElementById('pageContent').innerHTML = '<p>Fonctionnalité à développer</p>'; }
    async function loadVehicules() { document.getElementById('pageContent').innerHTML = '<p>Fonctionnalité à développer</p>'; }
    async function loadAgents() { document.getElementById('pageContent').innerHTML = '<p>Fonctionnalité à développer</p>'; }
    async function loadGestion() { 
        if (!canDelete()) return;
        const users = await db.ref('users').once('value');
        let pending = '', approved = '';
        users.forEach(child => {
            const u = child.val();
            if (u.status === 'pending') {
                pending += `<div>${u.prenom} ${u.nom} (${u.grade}) - ${u.pseudo} 
                    <button onclick="approveUser('${child.key}')">✅ Accepter</button>
                    <button onclick="rejectUser('${child.key}')">❌ Refuser</button></div>`;
            } else if (u.status === 'approved') {
                approved += `<div>✅ ${u.prenom} ${u.nom} (${u.grade}) 
                    <button onclick="revokeUser('${child.key}')">🚫 Révoquer</button></div>`;
            }
        });
        document.getElementById('pageContent').innerHTML = `<h3>Demandes en attente</h3>${pending || 'Aucune'}<h3>Utilisateurs autorisés</h3>${approved || 'Aucun'}`;
    }

    window.approveUser = async (id) => { await db.ref(`users/${id}`).update({ status: 'approved' }); showToast('Utilisateur approuvé'); loadGestion(); };
    window.rejectUser = async (id) => { await db.ref(`users/${id}`).update({ status: 'rejected' }); showToast('Demande refusée'); loadGestion(); };
    window.revokeUser = async (id) => { await db.ref(`users/${id}`).update({ status: 'rejected' }); showToast('Accès révoqué'); loadGestion(); };

    // --- AUTHENTIFICATION ---
    async function doLogin() {
        const prenom = document.getElementById('loginPrenom').value.trim();
        const nom = document.getElementById('loginNom').value.trim();
        const pwd = document.getElementById('loginPassword').value;
        if (!prenom || !nom || !pwd) { showToast("Veuillez remplir tous les champs"); return; }
        const key = `${prenom.toLowerCase()}_${nom.toLowerCase()}`;
        const snap = await db.ref(`users/${key}`).once('value');
        const user = snap.val();
        if (!user) { showToast("Compte inexistant"); return; }
        if (user.status === 'pending') { showToast("Demande en attente de validation"); return; }
        if (user.status !== 'approved') { showToast("Accès refusé"); return; }
        const hashed = await hashPassword(pwd);
        if (user.password !== hashed) { showToast("Mot de passe incorrect"); return; }
        currentUser = { ...user, id: key };
        localStorage.setItem('pm_session', JSON.stringify(currentUser));
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userInfo').innerHTML = `${currentUser.prenom} ${currentUser.nom}<br><small>${currentUser.grade}</small>`;
        if (canDelete()) document.getElementById('adminItem').style.display = 'block';
        showPage('dashboard');
    }

    async function doRegister() {
        const prenom = document.getElementById('regPrenom').value.trim();
        const nom = document.getElementById('regNom').value.trim();
        const pseudo = document.getElementById('regPseudo').value.trim();
        const pwd = document.getElementById('regPassword').value;
        const pwd2 = document.getElementById('regPassword2').value;
        const grade = document.getElementById('regGrade').value;
        if (!prenom || !nom || !pseudo || !pwd) { showToast("Tous les champs requis"); return; }
        if (pwd !== pwd2) { showToast("Les mots de passe ne correspondent pas"); return; }
        if (pwd.length < 4) { showToast("Mot de passe trop court (min 4)"); return; }
        const key = `${prenom.toLowerCase()}_${nom.toLowerCase()}`;
        const existing = await db.ref(`users/${key}`).once('value');
        if (existing.exists()) { showToast("Ce compte existe déjà"); return; }
        const hashed = await hashPassword(pwd);
        await db.ref(`users/${key}`).set({
            prenom, nom, pseudo, grade,
            password: hashed,
            status: 'pending',
            createdAt: new Date().toISOString()
        });
        showToast("Demande envoyée !");
        // revenir à l'onglet connexion
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('btnLoginTab').style.background = '#2a6df0';
        document.getElementById('btnRegisterTab').style.background = 'transparent';
    }

    // Gestion des onglets de login
    document.getElementById('btnLoginTab').onclick = () => {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('btnLoginTab').style.background = '#2a6df0';
        document.getElementById('btnRegisterTab').style.background = 'transparent';
    };
    document.getElementById('btnRegisterTab').onclick = () => {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('btnRegisterTab').style.background = '#2a6df0';
        document.getElementById('btnLoginTab').style.background = 'transparent';
    };
    document.getElementById('doLoginBtn').onclick = doLogin;
    document.getElementById('doRegisterBtn').onclick = doRegister;
    document.getElementById('logoutBtn').onclick = () => {
        localStorage.removeItem('pm_session');
        location.reload();
    };
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('genericModal').style.display = 'none';
    document.getElementById('modalCancelBtn').onclick = () => document.getElementById('genericModal').style.display = 'none';

    // Navigation sidebar
    document.querySelectorAll('.sidebar-item').forEach(el => {
        el.addEventListener('click', () => {
            const page = el.getAttribute('data-page');
            if (page) showPage(page);
        });
    });

    // Vérifier session existante
    const saved = localStorage.getItem('pm_session');
    if (saved) {
        try {
            const user = JSON.parse(saved);
            currentUser = user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userInfo').innerHTML = `${currentUser.prenom} ${currentUser.nom}<br><small>${currentUser.grade}</small>`;
            if (canDelete()) document.getElementById('adminItem').style.display = 'block';
            showPage('dashboard');
        } catch(e) {}
    } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
    }
</script>
</body>
</html>
