  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCGYQ7h7nkwegjLyLifsv29eiupnXRiC4w",
    authDomain: "site-pmpurp.firebaseapp.com",
    projectId: "site-pmpurp",
    storageBucket: "site-pmpurp.firebasestorage.app",
    messagingSenderId: "645801350661",

    measurementId: "G-NMC3HGDH6R"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Exposer Firebase globalement

<script>
// Attendre que Firebase soit prêt
let db = null;
let storage = null;
let fb = null;

window.addEventListener('firebase-ready', (event) => {
  db = event.detail.db;
  storage = event.detail.storage;
  fb = window.firebaseAPI;
  console.log('✅ Firebase connecté');
  checkSavedSession();
});

// Variables globales
let currentUser = null;
let counters = { rapports: 0, signalements: 0, saisies: 0, fiches: 0, vehicules: 0, agents: 0, plaintes: 0 };
let photoFiles = { fi: [], v: [] };
const ADMIN_GRADES = ['Directeur', 'Directeur Adjoint', 'Directeur Stagiaire'];
const MASTER_CODE_B64 = 'NzIzMg==';
let siteAccessEnabled = true;

// Fonctions utilitaires
function toast(title, msg, type = 'success') {
  let container = document.getElementById('toasts');
  if (!container) return;
  let el = document.createElement('div');
  el.className = `toast ${type === 'error' ? 'error' : type === 'warn' ? 'warn' : ''}`;
  el.innerHTML = `<strong>${title}</strong><br>${msg}`;
  container.appendChild(el);
  setTimeout(() => el.remove(), 3100);
}

function fmtDate(d) {
  if (!d) return '—';
  try {
    return new Date(d).toLocaleString('fr-FR', { dateStyle: 'short', timeStyle: 'short' });
  } catch (e) {
    return d;
  }
}

function statusBadge(s) {
  let map = { 'Ouvert': 'badge-open', 'En cours': 'badge-progress', 'Clôturé': 'badge-closed' };
  return `<span class="badge ${map[s] || 'badge-neutral'}">${s || '—'}</span>`;
}

function plainteStatusBadge(s) {
  let map = { 'En attente': 'badge-open', 'En cours': 'badge-progress', 'Résolue': 'badge-closed', 'Classée sans suite': 'badge-neutral' };
  return `<span class="badge ${map[s] || 'badge-neutral'}">${s || '—'}</span>`;
}

function canDelete() {
  return currentUser && ADMIN_GRADES.includes(currentUser.grade);
}

function v(id) {
  let el = document.getElementById(id);
  return el ? el.value : '';
}

function resetForm(ids) {
  ids.forEach(id => {
    let el = document.getElementById(id);
    if (el) el.value = '';
  });
}

function resetPhotoPreview(prefix) {
  photoFiles[prefix] = [];
  let preview = document.getElementById(`${prefix}-photos-preview`);
  if (preview) preview.innerHTML = '';
  let input = document.getElementById(`${prefix}-photos-input`);
  if (input) input.value = '';
}

function showPage(name, el) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  let page = document.getElementById('page-' + name);
  if (page) page.classList.add('active');
  if (el) el.classList.add('active');
  let titles = {
    dashboard: 'Tableau de bord', rapports: "Rapports d'intervention",
    signalements: 'Signalements', plaintes: 'Plaintes', saisies: 'Saisies',
    fiches: 'Fiches individus', vehicules: 'Véhicules recherchés',
    agents: 'Agents', gestion: 'Gestion du site'
  };
  let titleEl = document.getElementById('page-title');
  if (titleEl) titleEl.textContent = titles[name] || name;
  if (name === 'gestion' && canDelete()) {
    loadAccessRequests();
    loadSiteAccessState();
  }
}

function openModal(id) {
  let modal = document.getElementById(id);
  if (modal) modal.classList.add('open');
}

function closeModal(id) {
  let modal = document.getElementById(id);
  if (modal) modal.classList.remove('open');
}

function openLightbox(url) {
  let img = document.getElementById('lightbox-img');
  let lightbox = document.getElementById('lightbox');
  if (img && lightbox) {
    img.src = url;
    lightbox.classList.add('open');
  }
}

function closeLightbox() {
  let lightbox = document.getElementById('lightbox');
  if (lightbox) lightbox.classList.remove('open');
}

function filterTable(tableId, query) {
  let rows = document.querySelectorAll(`#${tableId} tbody tr`);
  rows.forEach(row => {
    row.style.display = row.textContent.toLowerCase().includes(query.toLowerCase()) ? '' : 'none';
  });
}

function filterStatus(tableId, status) {
  let rows = document.querySelectorAll(`#${tableId} tbody tr`);
  rows.forEach(row => {
    row.style.display = !status || row.textContent.includes(status) ? '' : 'none';
  });
  let btns = document.querySelectorAll(`#${tableId}`)[0]?.closest('.table-wrap')?.querySelectorAll('.filter-btn');
  if (btns) {
    btns.forEach(b => {
      b.classList.toggle('active', b.textContent === (status || 'Tous') || (b.textContent === 'Tous' && !status));
    });
  }
}

// Gestion des photos
function handlePhotoSelect(prefix, input) {
  let files = Array.from(input.files);
  if (!photoFiles[prefix]) photoFiles[prefix] = [];
  photoFiles[prefix] = [...photoFiles[prefix], ...files];
  
  let preview = document.getElementById(`${prefix}-photos-preview`);
  if (!preview) return;
  
  files.forEach(file => {
    let reader = new FileReader();
    reader.onload = e => {
      let wrap = document.createElement('div');
      wrap.className = 'photo-thumb-wrap';
      wrap.innerHTML = `<img class="photo-thumb" src="${e.target.result}"><button class="photo-thumb-del" onclick="removePhotoPreview(this,'${prefix}')">×</button>`;
      preview.appendChild(wrap);
    };
    reader.readAsDataURL(file);
  });
}

window.removePhotoPreview = function(btn, prefix) {
  let wrap = btn.parentElement;
  let idx = Array.from(wrap.parentElement.children).indexOf(wrap);
  if (photoFiles[prefix] && idx !== -1) {
    photoFiles[prefix].splice(idx, 1);
  }
  wrap.remove();
};

async function uploadPhotos(prefix) {
  let files = photoFiles[prefix] || [];
  if (!files.length) return [];
  
  let urls = [];
  for (let file of files) {
    try {
      let storageRef = fb.ref(storage, `photos/${prefix}_${Date.now()}_${file.name}`);
      await fb.uploadBytes(storageRef, file);
      let url = await fb.getDownloadURL(storageRef);
      urls.push(url);
    } catch (e) {
      console.error('Erreur upload:', e);
    }
  }
  photoFiles[prefix] = [];
  return urls;
}

// Authentification
function checkSavedSession() {
  let saved = localStorage.getItem('pm_session');
  if (saved) {
    try {
      let userData = JSON.parse(saved);
      loginUser(userData, false);
    } catch (e) {
      console.error(e);
    }
  }
}

function doLogout() {
  localStorage.removeItem('pm_session');
  currentUser = null;
  let loginScreen = document.getElementById('login-screen');
  let mainApp = document.getElementById('main-app');
  let masterBtn = document.getElementById('master-btn');
  if (loginScreen) loginScreen.style.display = 'flex';
  if (mainApp) mainApp.style.display = 'none';
  if (masterBtn) masterBtn.style.display = 'block';
  toast('Déconnecté', 'À bientôt !', 'info');
}

function switchLoginTab(tab) {
  let tabLogin = document.getElementById('tab-login');
  let tabRegister = document.getElementById('tab-register');
  let formLogin = document.getElementById('form-login');
  let formRegister = document.getElementById('form-register');
  let loginPending = document.getElementById('login-pending');
  
  if (tabLogin && tabRegister) {
    tabLogin.classList.toggle('active', tab === 'login');
    tabRegister.classList.toggle('active', tab === 'register');
  }
  if (formLogin) formLogin.style.display = tab === 'login' ? 'flex' : 'none';
  if (formRegister) formRegister.style.display = tab === 'register' ? 'flex' : 'none';
  if (loginPending) loginPending.style.display = 'none';
}

async function doLogin() {
  if (!db || !fb) {
    toast('Erreur', 'Base de données non connectée', 'error');
    return;
  }
  
  let prenom = document.getElementById('login-prenom')?.value.trim();
  let nom = document.getElementById('login-nom')?.value.trim();
  
  if (!prenom || !nom) {
    toast('Erreur', 'Veuillez remplir les champs', 'error');
    return;
  }
  
  let key = `${prenom.toLowerCase()}_${nom.toLowerCase()}`;
  
  try {
    let docRef = fb.doc(db, 'users', key);
    let snap = await fb.getDoc(docRef);
    
    if (!snap.exists()) {
      toast('Accès refusé', 'Aucun compte trouvé.', 'error');
      return;
    }
    
    let userData = snap.data();
    
    if (userData.status === 'pending') {
      let formLogin = document.getElementById('form-login');
      let loginPending = document.getElementById('login-pending');
      if (formLogin) formLogin.style.display = 'none';
      if (loginPending) loginPending.style.display = 'block';
      return;
    }
    
    if (userData.status !== 'approved') {
      toast('Accès refusé', 'Demande rejetée.', 'error');
      return;
    }
    
    loginUser(userData, true);
  } catch (e) {
    console.error(e);
    toast('Erreur', e.message, 'error');
  }
}

function loginUser(userData, save) {
  currentUser = userData;
  if (save) localStorage.setItem('pm_session', JSON.stringify(userData));
  
  let loginScreen = document.getElementById('login-screen');
  let mainApp = document.getElementById('main-app');
  let masterBtn = document.getElementById('master-btn');
  let sidebarUsername = document.getElementById('sidebar-username');
  let sidebarRole = document.getElementById('sidebar-role');
  
  if (loginScreen) loginScreen.style.display = 'none';
  if (mainApp) mainApp.style.display = 'flex';
  if (masterBtn) masterBtn.style.display = 'none';
  if (sidebarUsername) sidebarUsername.textContent = `${userData.prenom} ${userData.nom}`;
  if (sidebarRole) sidebarRole.textContent = userData.grade || 'AGENT';
  
  let isAdmin = ADMIN_GRADES.includes(userData.grade);
  if (isAdmin) {
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = 'flex');
    loadAccessRequests();
    loadSiteAccessState();
  }
  
  initListeners();
}

function openMasterModal() {
  let modal = document.getElementById('modal-master');
  let input = document.getElementById('master-code-input');
  let error = document.getElementById('master-error');
  if (modal) modal.style.display = 'flex';
  if (input) {
    input.value = '';
    setTimeout(() => input.focus(), 100);
  }
  if (error) error.style.display = 'none';
}

function closeMasterModal() {
  let modal = document.getElementById('modal-master');
  if (modal) modal.style.display = 'none';
}

function doMasterLogin() {
  let input = document.getElementById('master-code-input');
  let error = document.getElementById('master-error');
  if (!input) return;
  
  let code = input.value.trim();
  if (btoa(code) === MASTER_CODE_B64) {
    closeMasterModal();
    loginUser({ prenom: 'Accès', nom: 'Maître', grade: 'Directeur', status: 'approved', isMaster: true }, true);
  } else if (error) {
    error.style.display = 'block';
  }
}

async function doRegister() {
  if (!db || !fb) {
    toast('Erreur', 'Base de données non connectée', 'error');
    return;
  }
  
  let prenom = document.getElementById('reg-prenom')?.value.trim();
  let nom = document.getElementById('reg-nom')?.value.trim();
  let pseudo = document.getElementById('reg-pseudo')?.value.trim();
  let grade = document.getElementById('reg-grade')?.value;
  
  if (!prenom || !nom || !pseudo) {
    toast('Erreur', 'Tous les champs sont requis', 'error');
    return;
  }
  
  let key = `${prenom.toLowerCase()}_${nom.toLowerCase()}`;
  
  try {
    let userRef = fb.doc(db, 'users', key);
    await fb.setDoc(userRef, {
      prenom, nom, pseudo, grade,
      status: 'pending',
      createdAt: new Date().toISOString()
    });
    
    let formRegister = document.getElementById('form-register');
    let loginPending = document.getElementById('login-pending');
    if (formRegister) formRegister.style.display = 'none';
    if (loginPending) loginPending.style.display = 'block';
    
    toast('Demande envoyée', 'Un directeur examinera votre demande.', 'success');
  } catch (e) {
    console.error(e);
    toast('Erreur', e.message, 'error');
  }
}

// Gestion administrative
async function loadAccessRequests() {
  if (!db || !fb) return;
  
  try {
    let usersRef = fb.collection(db, 'users');
    let snap = await fb.getDocs(usersRef);
    let pending = [];
    let approved = [];
    
    snap.forEach(d => {
      let u = { id: d.id, ...d.data() };
      if (u.status === 'pending') pending.push(u);
      else if (u.status === 'approved') approved.push(u);
    });
    
    let badge = document.getElementById('badge-gestion');
    if (badge) {
      if (pending.length) {
        badge.style.display = 'inline';
        badge.textContent = pending.length;
      } else {
        badge.style.display = 'none';
      }
    }
    
    let requestsList = document.getElementById('access-requests-list');
    if (requestsList) {
      if (pending.length) {
        requestsList.innerHTML = pending.map(u => `
          <div class="access-request-card">
            <div class="info">
              <div class="name">👤 ${u.prenom} ${u.nom}</div>
              <div class="sub">Grade demandé : ${u.grade} • OOC : ${u.pseudo}</div>
            </div>
            <div class="actions">
              <button class="btn btn-primary btn-sm" onclick="approveUser('${u.id}')">✅ Accepter</button>
              <button class="btn btn-danger btn-sm" onclick="rejectUser('${u.id}')">❌ Refuser</button>
            </div>
          </div>
        `).join('');
      } else {
        requestsList.innerHTML = '<div class="empty-state" style="padding:20px 0;"><div class="label">Aucune demande en attente</div></div>';
      }
    }
    
    let approvedList = document.getElementById('approved-users-list');
    if (approvedList) {
      if (approved.length) {
        approvedList.innerHTML = approved.map(u => `
          <div class="access-request-card">
            <div class="info">
              <div class="name">✅ ${u.prenom} ${u.nom}</div>
              <div class="sub">${u.grade} • OOC : ${u.pseudo || '—'}</div>
            </div>
            <div class="actions">
              <button class="btn btn-danger btn-sm" onclick="revokeUser('${u.id}')">🚫 Révoquer</button>
            </div>
          </div>
        `).join('');
      } else {
        approvedList.innerHTML = '<div class="empty-state" style="padding:20px 0;"><div class="label">Aucun utilisateur</div></div>';
      }
    }
  } catch (e) {
    console.error('Erreur chargement demandes:', e);
  }
}

window.approveUser = async function(id) {
  if (!db || !fb) return;
  await fb.updateDoc(fb.doc(db, 'users', id), { status: 'approved' });
  toast('Accès accordé', '', 'success');
  loadAccessRequests();
};

window.rejectUser = async function(id) {
  if (!db || !fb) return;
  await fb.updateDoc(fb.doc(db, 'users', id), { status: 'rejected' });
  toast('Accès refusé', '', 'warn');
  loadAccessRequests();
};

window.revokeUser = async function(id) {
  if (!db || !fb) return;
  await fb.updateDoc(fb.doc(db, 'users', id), { status: 'rejected' });
  toast('Accès révoqué', '', 'warn');
  loadAccessRequests();
};

async function loadSiteAccessState() {
  if (!db || !fb) return;
  try {
    let snap = await fb.getDoc(fb.doc(db, 'config', 'site'));
    siteAccessEnabled = snap.exists() ? snap.data().accessEnabled !== false : true;
    renderSiteAccessToggle();
  } catch (e) {
    console.error(e);
  }
}

function renderSiteAccessToggle() {
  let toggle = document.getElementById('site-access-toggle');
  let knob = document.getElementById('site-access-knob');
  let label = document.getElementById('site-access-label');
  if (!toggle) return;
  
  if (siteAccessEnabled) {
    toggle.style.background = 'var(--green)';
    if (knob) knob.style.left = '26px';
    if (label) {
      label.textContent = 'ACTIVÉ';
      label.style.color = 'var(--green)';
    }
  } else {
    toggle.style.background = '#a01f30';
    if (knob) knob.style.left = '3px';
    if (label) {
      label.textContent = 'DÉSACTIVÉ';
      label.style.color = 'var(--red)';
    }
  }
}

window.toggleSiteAccess = async function() {
  if (!db || !fb) return;
  siteAccessEnabled = !siteAccessEnabled;
  renderSiteAccessToggle();
  await fb.setDoc(fb.doc(db, 'config', 'site'), { accessEnabled: siteAccessEnabled });
  toast(siteAccessEnabled ? '✅ Site ouvert' : '🔒 Site fermé',
        siteAccessEnabled ? 'Les agents peuvent maintenant se connecter.' : 'Les connexions sont maintenant bloquées.',
        siteAccessEnabled ? 'success' : 'warn');
};

// Écouteurs Firebase en temps réel
function initListeners() {
  if (!db || !fb) return;
  
  // Écouter les rapports
  fb.onSnapshot(fb.collection(db, 'rapports'), (snap) => {
    let items = [];
    snap.forEach(d => items.push({ id: d.id, ...d.data() }));
    items.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    renderRapports(items);
  });
  
  // Écouter les signalements
  fb.onSnapshot(fb.collection(db, 'signalements'), (snap) => {
    let items = [];
    snap.forEach(d => items.push({ id: d.id, ...d.data() }));
    items.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    renderSignalements(items);
  });
  
  // Écouter les plaintes
  fb.onSnapshot(fb.collection(db, 'plaintes'), (snap) => {
    let items = [];
    snap.forEach(d => items.push({ id: d.id, ...d.data() }));
    items.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    renderPlaintes(items);
  });
  
  // Écouter les saisies
  fb.onSnapshot(fb.collection(db, 'saisies'), (snap) => {
    let items = [];
    snap.forEach(d => items.push({ id: d.id, ...d.data() }));
    items.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    renderSaisies(items);
  });
  
  // Écouter les fiches
  fb.onSnapshot(fb.collection(db, 'fiches'), (snap) => {
    let items = [];
    snap.forEach(d => items.push({ id: d.id, ...d.data() }));
    items.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    renderFiches(items);
  });
  
  // Écouter les véhicules
  fb.onSnapshot(fb.collection(db, 'vehicules'), (snap) => {
    let items = [];
    snap.forEach(d => items.push({ id: d.id, ...d.data() }));
    items.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    renderVehicules(items);
  });
  
  // Écouter les agents
  fb.onSnapshot(fb.collection(db, 'agents'), (snap) => {
    let items = [];
    snap.forEach(d => items.push({ id: d.id, ...d.data() }));
    items.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
    renderAgents(items);
  });
}

// Rendu des données
function renderRapports(items) {
  counters.rapports = items.length;
  let statRapports = document.getElementById('stat-rapports');
  if (statRapports) statRapports.textContent = items.length;
  
  let tbody = document.getElementById('rapports-tbody');
  if (!tbody) return;
  
  if (!items.length) {
    tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state"><div class="icon">📋</div><div class="label">Aucun rapport enregistré</div></div></td></tr>';
    return;
  }
  
  tbody.innerHTML = items.map(r => `
    <tr onclick="viewRapport('${r.id}')">
      <td><span style="font-family:var(--mono);color:var(--blue);">${r.num || r.id.slice(0, 8)}</span></td>
      <td>${fmtDate(r.date)}</td>
      <td>${r.type || '—'}</td>
      <td>${r.lieu || '—'}</td>
      <td>${r.agent || '—'}</td>
      <td>${statusBadge(r.statut)}</td>
      <td onclick="event.stopPropagation()">${canDelete() ? `<button class="btn btn-danger btn-sm" onclick="deleteItem('rapports','${r.id}')">🗑️</button>` : ''}</td>
    </tr>
  `).join('');
  
  // Activité récente (5 premiers)
  let activityContainer = document.getElementById('activity-container');
  if (activityContainer) {
    let recent = items.slice(0, 5);
    if (!recent.length) {
      activityContainer.innerHTML = '<div class="empty-state"><div class="icon">📋</div><div class="label">Aucune activité pour le moment</div></div>';
    } else {
      activityContainer.innerHTML = `<div class="activity-list">${recent.map(r => `
        <div class="activity-item">
          <div class="activity-dot" style="background:var(--blue);"></div>
          <div>
            <div class="activity-text">Rapport ${r.num || ''} — ${r.type || ''} à ${r.lieu || 'lieu inconnu'}</div>
            <div class="activity-time">${fmtDate(r.date)} • Agent : ${r.agent || '—'}</div>
          </div>
        </div>
      `).join('')}</div>`;
    }
  }
}

function renderSignalements(items) {
  counters.signalements = items.length;
  let badge = document.getElementById('badge-signalements');
  if (badge) {
    if (items.length) {
      badge.style.display = 'inline';
      badge.textContent = items.length;
    } else {
      badge.style.display = 'none';
    }
  }
  
  let tbody = document.getElementById('signalements-tbody');
  if (!tbody) return;
  
  if (!items.length) {

  tbody.innerHTML = items.map((s, i) => `

}
